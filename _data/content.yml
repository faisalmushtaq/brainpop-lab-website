about: |
  The BrainPop Team works at the intersection of cognitive science, population health, and data science to understand brain function and behaviour. We use neuroimaging (primarily EEG) and behavioural methods that can be delivered at scale across diverse sites and contexts, and we strive to maintain the highest standards of transparency and inclusion in our science. Our goal is to build resources that advance both fundamental knowledge and deliver meaningful societal impact.

approach: |
  We design and deliver cognitive science research that is inclusive, transparent, and globally connected. Combining EEG and behavioural methods, we work closely with schools, communities, and international partners to ensure that the benefits of brain science extend beyond the laboratory and reflect the diversity of human experience.

  You can find an up-to-date record of our publications through [Faisal's Google Scholar profile](https://scholar.google.com/citations?user=bcjpWSwAAAAJ&hl=en).
  
partnerships: |
  Our work is embedded within a global network of collaborators committed to advancing open and inclusive cognitive science. We work with the Global Brain Consortium to promote data sharing and methodological standardisation across international EEG initiatives. We also collaborate with partners across Africa, Asia, and Latin America to strengthen global capacity for EEG and behavioural research and to contribute to a shared, equitable infrastructure for brain data science. Locally, our team is embedded within the Centre for Applied Education Research, where we are working on linking brain and behavioural data with population health and education records, enabling research that spans development, context, and lifespan.

join: |
  We are always keen to hear from people who share our commitment to open, scalable, and globally inclusive cognitive science.

  If you are a prospective international PhD student with scholarship support from your government or another external funding source and would like to join our team, we would be very pleased to hear from you. Drop us an email with details of your scholarship and a copy of your CV.

  Similarly, for home‑rated students interested in applying for a PhD scholarship, please get in touch and include a copy of your CV.

  While the current UK funding landscape offers limited opportunities for international students looking for PhD funding, we are still happy to hear from strong candidates and to explore possible routes where appropriate. Please note that in our experience, competitive applications in these situations require a track record of publications.

  If you are interested in joining us as a postdoctoral researcher, we encourage you to consider applying for fellowship funding to bring your expertise to our team. All of our project-funded postdoctoral opportunities are advertised through jobs.ac.uk and the University of Leeds website.

contact: |
  Our team is based across the Wolfson Centre for Applied Health Research on site at the Bradford Teaching Hospitals NHS Foundation Trust, and the School of Psychology, Faculty of Medicine and Health, University of Leeds, Leeds, United Kingdom.

  You can reach us via [BrainPop@leeds.ac.uk](mailto:BrainPop@leeds.ac.uk).
