- name: "Dr Dominik Welke"
  role: "Postdoctoral Researcher"
  bio: |
    Dominik specialises in multimodal neuroimaging and developing robust, scalable methods for multi-site studies, contributing to open-science infrastructure.
  image: "dominik_welke.png?v=4"
  links:
    - label: "Google Scholar"
      url: "https://scholar.google.com/citations?user=B5xCyM0AAAAJ"
    - label: "ORCiD"
