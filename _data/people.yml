- name: "Professor Faisal Mushtaq"
  role: "Principal Investigator"
  bio: |
    Faisal's research focuses on open, scalable, and globally inclusive approaches to brain-data science and linking large-scale experimental and population studies.
  image: "faisal_mushtaq.jpg"
