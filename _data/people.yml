- name: "Dr Olivia Jones"
  role: "Lecturer"
  bio: |
    Olivia is a Lecturer and in the BrainPop Lab contributes to research on cognitive development and EEG methods across diverse populations.
  image: "olivia_jones.webp"
  links: []

- name: "Dr Sarmad Ali"
  role: "Programme Coordinator"
  bio: |
    Sarmad coordinates research operations across the BrainPop Lab, managing project timelines, international partnerships, and public engagement activities.
  image: "sarmad_ali.png"
  links:
    - label: "Email"
      url: "mailto:BrainPop@leeds.ac.uk"

- name: "Dr Jasper van den Bosch"
  role: "Postdoctoral Researcher"
  bio: |
    Jasper focuses on EEG signal processing and reproducibility, contributing to open-science infrastructure for large-scale cognitive neuroscience.
  image: "jasper_van_den_bosch.jpg"
  links:
    - label: "Google Scholar"
      url: "https://scholar.google.com/citations?user=XQ3-JHgAAAAJ"
    - label: "ORCiD"
