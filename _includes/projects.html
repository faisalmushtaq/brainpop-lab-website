<section id="projects" class="section section-light">
  <div class="container">
    <div class="reveal"><h2>Our <span class="accent">Projects</span></h2></div>
    <div class="project-grid">
      {% for project in site.data.projects %}
   <div class="project-card reveal" id="{{ project.id }}" data-category="{{ project.category | default: 'Research' }}">
        {% if project.image %}
        <div class="project-card-img">
          <img src="{{ site.baseurl }}/assets/images/projects/{{ project.image }}" alt="{{ project.title }} project image">
        </div>
        {% endif %}
        <div class="project-card-body">
          <div class="project-card-label">{{ project.category | default: 'Research' }}</div>
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          <span class="project-card-arrow">Learn more &nbsp;&rarr;</span>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
