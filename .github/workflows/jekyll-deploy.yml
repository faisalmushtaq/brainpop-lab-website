name: Jekyll Deploy
on:
push:
branches:
- master
jobs:
build-and-deploy:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-ruby@v1
with:
ruby-version: '3.x'
- run: gem install bundler
- run: bundle install
- run: bundle exec jekyll build
- uses: actions/upload-pages-artifact@v3
with:
path: ./_site
- uses: actions/deploy-pages@v4
